<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picaflor Assistant</title>
    <style>
        :root { 
            --primary: #008080; 
            --bg: #e0f2f2; 
            --accent: #ff4444; 
            --white: #ffffff; 
            --text: #2c3e50;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; /* Altezza dinamica per mobile */
            overflow: hidden; 
        }
        
        #entry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }
        #entry-btn { 
            background: var(--white); color: var(--primary); border: none; padding: 20px 60px; 
            border-radius: 50px; font-size: 22px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.2s;
        }

        .container { 
            width: 100%; 
            height: 100%; 
            max-width: 500px; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        .avatar-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            overflow: hidden;
        }
        
        .logo-circle { 
            width: 50vw;
            height: 50vw;
            max-width: 220px;
            max-height: 220px;
            background: var(--white); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        
        .logo-circle svg { width: 85%; height: 85%; transition: transform 0.4s ease; }

        .listening-animation { animation: float 2s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        #avatar-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        .mic-btn { 
            background: var(--primary); color: var(--white); border: none; 
            padding: 15px 35px; border-radius: 50px; font-size: 18px; 
            font-weight: bold; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; 
            box-shadow: 0 8px 20px rgba(0, 128, 128, 0.2);
        }
        .mic-btn.listening { background: var(--accent); }
        
        #status-text { 
            margin-top: 15px; color: #555; font-size: 14px; 
            text-align: center; min-height: 40px; padding: 0 20px;
            line-height: 1.3;
        }

        .lang-bar { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            padding: 15px 10px; 
            background: var(--white); 
            border-top: 1px solid #ddd; 
        }
        .lang-btn { font-size: 28px; cursor: pointer; border: none; background: none; filter: grayscale(90%); transition: 0.3s; padding: 5px; }
        .lang-btn.active { filter: grayscale(0%); transform: scale(1.2); }

        #message-box {
            position: absolute; bottom: -100%; left: 0; width: 100%; background: var(--white);
            padding: 25px; box-sizing: border-box; border-top: 5px solid var(--primary);
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; max-height: 85%; overflow-y: auto;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
        }
        #message-box.active { bottom: 0; }
        #message-box h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #message-box p { color: var(--text); line-height: 1.5; font-size: 14px; white-space: pre-line; margin: 0; }
        #close-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; font-size: 15px; }

        .footer { text-align: center; padding: 8px; font-size: 9px; color: #999; background: var(--white); letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="entry-overlay">
    <h1 style="margin:0; font-size: 32px;">PICAFLOR</h1>
    <p>Reception Virtual Assistant</p>
    <br>
    <button id="entry-btn" onclick="startApp()">ENTRA / START</button>
</div>

<div class="container">
    <div class="avatar-section">
        <div class="logo-circle">
            <svg id="avatar-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#8e44ad;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradBody" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M100,75 C140,15 190,45 170,80 C150,95 125,90 100,75 Z" fill="url(#gradPurple)" />
                <path d="M100,85 C125,120 170,110 160,90 C140,85 120,85 100,85 Z" fill="#2980b9" opacity="0.6" />
                <path d="M45,100 C75,65 115,85 105,125 C100,150 75,135 45,100 Z" fill="url(#gradBody)" />
                <path d="M48,97 L10,93" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" />
                <circle cx="60" cy="92" r="8" fill="#2ecc71" />
                <path d="M60,84 C68,84 75,92 60,100" fill="#e74c3c" />
                <circle cx="58" cy="91" r="2" fill="black" />
                <path d="M105,130 L125,175 L145,160 L120,130 Z" fill="#8e44ad" />
            </svg>
        </div>
        <iframe id="avatar-video" src="" allow="autoplay; encrypted-media"></iframe>
        <button id="start-record" class="mic-btn"><span>🎤</span> <span id="btn-text">PARLA CON ME</span></button>
        <p id="status-text">Benvenuti / Welcome</p>
    </div>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('it', this)">🇮🇹</button>
        <button class="lang-btn" onclick="setLang('en', this)">🇬🇧</button>
        <button class="lang-btn" onclick="setLang('fr', this)">🇫🇷</button>
        <button class="lang-btn" onclick="setLang('zh', this)">🇨🇳</button>
        <button class="lang-btn" onclick="setLang('ar', this)">🇸🇦</button>
    </div>

    <div id="message-box">
        <h2 id="message-title">Informazioni</h2>
        <p id="message-text"></p>
        <button id="close-btn" onclick="closeMsg()">CHIUDI / CLOSE</button>
    </div>

    <div class="footer">PICAFLOR FORESTERIA MILANO</div>
</div>

<script>
    const videoSources = { it: "m0qVT2NHpSk", en: "m0qVT2NHpSk", fr: "GY4I0DI0k_c", zh: "4Ht33knKyrg", ar: "68-1Mq8pWHU" };
    
    const translations = {
        it: {
            title: "Informazioni richieste", close: "CHIUDI",
            welcome: "Benvenuti alla foresteria lombarda Picaflor. Chiedetemi pure a voce, come posso aiutarvi?",
            btn: "PARLA CON ME", status: "Ti ascolto...",
            noMatch: "Scusa, non ho capito bene. Prova a chiedermi di ristoranti, mezzi pubblici o regole della casa.",
            keywords: {
                food: ["mangiare", "ristorante", "pizza", "sushi", "bar", "caffè", "cena", "fame"],
                transport: ["mezzi", "tram", "bus", "autobus", "metro", "19", "1", "14"],
                services: ["supermercato", "farmacia", "lidl", "coop", "spesa"],
                rules: ["regole", "check-out", "wifi", "internet", "silenzio", "parcheggio"]
            },
            answers: {
                food: "BAR E CAFFÈ:\n- Buatta Caffetteria (via Masolino 12)\n- Bar Torrefazione (via Masolino 4)\n\nRISTORANTI:\n- Gennaro Rapido (via Bartolini 36)\n- Wamiya Sushi (viale Certosa 42)\n- Il Faraone (via Masolino 13)\n- Mosto Generoso (Hamburger)",
                transport: "TRAM:\n- 19: via Masolino (dir. Castelli o Lambrate)\n- 1 e 14: viale Certosa\n\nBUS:\n- 57/48: via Bodoni\n- 69: viale Certosa",
                services: "SPESA:\n- Lidl (via Masolino 7)\n- Ipercoop (Portello)\n\nFARMACIE:\n- Fusco (via Bodoni 19)\n- Benu (Prealpi 3)",
                rules: "INFO CASA:\n- Check-out: entro le ore 10:00.\n- Silenzio: 22:00 - 08:00.\n- Area comune: Bollitori, frigo e microonde.\n- Camera: Bagno privato, asciugamani, clima autonomo."
            }
        },
        en: {
            title: "Requested Information", close: "CLOSE",
            welcome: "Welcome to Foresteria Picaflor. I am your digital assistant, how can I help you?",
            btn: "TALK TO ME", status: "Listening...",
            noMatch: "Sorry, I didn't get that. Ask me about food, transport, or house rules.",
            keywords: {
                food: ["eat", "restaurant", "pizza", "sushi", "coffee", "hungry", "dinner"],
                transport: ["transport", "tram", "bus", "metro", "station"],
                services: ["supermarket", "pharmacy", "lidl", "mall", "shopping"],
                rules: ["rules", "check-out", "kettle", "wifi", "internet", "parking"]
            },
            answers: {
                food: "BARS & CAFE:\n- Buatta (via Masolino 12)\n- Torrefazione (via Masolino 4)\n\nRESTAURANTS:\n- Gennaro Rapido (Pizza)\n- Wamiya Sushi\n- Il Faraone (Egyptian)\n- Mosto Generoso (Burgers)",
                transport: "TRAM:\n- 19: via Masolino\n- 1 & 14: viale Certosa\n\nBUS:\n- 57/48: via Bodoni\n- 69: viale Certosa",
                services: "MARKETS:\n- Lidl (via Masolino 7)\n- Ipercoop (Portello Mall)\n\nPHARMACY:\n- Fusco (Bodoni 19)\n- Benu (Prealpi 3)",
                rules: "HOUSE RULES:\n- Check-out: by 10:00 AM.\n- Quiet hours: 10 PM - 8 AM.\n- Facilities: Kettles, fridge, microwave in common area.\n- Room: Private bathroom, towels, AC.\n- Parking: Free on the street."
            }
        },
        fr: {
            title: "Informations demandées", close: "FERMER",
            welcome: "Bienvenue à la Foresteria Picaflor. Je suis votre assistant numérique, comment puis-je vous aider ?",
            btn: "PARLEZ-MOI", status: "J'écoute...",
            noMatch: "Désolé, je n'ai pas compris. Demandez-moi pour la nourriture, les transports o les règles.",
            keywords: {
                food: ["manger", "restaurant", "pizza", "sushi", "café", "faim", "dîner"],
                transport: ["transport", "tram", "bus", "métro", "gare"],
                services: ["supermarché", "pharmacie", "lidl", "courses"],
                rules: ["règles", "départ", "bouilloire", "wifi", "internet", "parking"]
            },
            answers: {
                food: "BARS ET CAFÉ:\n- Buatta (via Masolino 12)\n\nRESTAURANTS:\n- Gennaro Rapido (Pizza)\n- Wamiya Sushi\n- Il Faraone\n- Mosto Generoso (Burgers)",
                transport: "TRAM:\n- 19: via Masolino\n- 1 & 14: viale Certosa\n\nBUS:\n- 57/48: via Bodoni",
                services: "COURSES:\n- Lidl (via Masolino 7)\n- Ipercoop (C.C. Portello)",
                rules: "RÈGLES:\n- Check-out: avant 10h00.\n- Silence: 22h00 - 08h00.\n- Équipements: Bouilloire, frigo, micro-ondes communs.\n- Chambre: Salle de bain privée, serviettes, clim."
            }
        },
        zh: {
            title: "所需信息", close: "关闭",
            welcome: "欢迎来到 Picaflor。我是您的数字助手，我能帮您什么？",
            btn: "和我说话", status: "正在倾听...",
            noMatch: "抱歉，我没听懂。请询问餐厅、交通或规定。",
            keywords: {
                food: ["吃", "餐厅", "比萨", "寿司", "咖啡", "饿", "晚饭"],
                transport: ["交通", "电车", "公交", "地铁", "站"],
                services: ["超市", "药房", "买东西"],
                rules: ["规定", "退房", "热水壶", "wifi", "网络", "停车"]
            },
            answers: {
                food: "咖啡馆:\n- Buatta (via Masolino 12)\n\n餐厅:\n- Gennaro Rapido (比萨)\n- Wamiya (寿司)\n- Mosto Generoso (汉堡)",
                transport: "电车:\n- 19路: via Masolino\n- 1路 & 14路: viale Certosa\n\n公交:\n- 57/48路: via Bodoni",
                services: "超市:\n- Lidl (via Masolino 7)\n- Ipercoop (C.C. Portello)",
                rules: "客房规则:\n- 退房: 上午10:00前。\n- 安静时间: 晚上10点至早上8点。\n- 设施: 提供热水壶、冰箱、微波炉。\n- 房间: 私人浴室, 毛巾, 空调。"
            }
        },
        ar: {
            title: "المعلومات المطلوبة", close: "إغلاق",
            welcome: "مرحباً بكم في Picaflor. أنا مساعدكم الرقمي، كيف يمكنني مساعدتكم؟",
            btn: "تحدث معي", status: "أنا أسمعك...",
            noMatch: "عذراً، لم أفهم. اسأل عن المطاعم، المواصلات أو القواعد.",
            keywords: {
                food: ["أكل", "مطعم", "بيتزا", "سوشي", "قهوة", "جائع"],
                transport: ["مواصلات", "ترام", "حافلة", "مترو", "محطة"],
                services: ["سوبر ماركت", "صيدلية", "تسوق"],
                rules: ["قواعد", "مغادرة", "غلاية", "واي فاي", "هدوء", "موقف"]
            },
            answers: {
                food: "مقهى:\n- Buatta (via Masolino 12)\n\nمطاعم:\n- Gennaro Rapido (بيتزا)\n- Wamiya Sushi\n- Il Faraone",
                transport: "ترام:\n- 19: via Masolino\n- 1 & 14: viale Certosa\n\nحافلة:\n- 57/48: via Bodoni",
                services: "تسوق:\n- Lidl (via Masolino 7)\n- Ipercoop (Portello Mall)",
                rules: "قواعد المنزل:\n- المغادرة: حتى الساعة 10:00 صباحاً.\n- الهدوء: من 10 مساءً حتى 8 صباحاً.\n- المرافق: غلاية، ثلاجة، ميكروويف في المنطقة المشتركة."
            }
        }
    };

    let currentLang = 'it';
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    function startApp() {
        document.getElementById('entry-overlay').style.display = 'none';
        setLang('it', document.querySelector('.lang-btn'));
    }

    function setLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const data = translations[lang] || translations['it'];
        document.getElementById('btn-text').innerText = data.btn;
        document.getElementById('status-text').innerText = data.welcome;
        document.getElementById('message-title').innerText = data.title;
        document.getElementById('close-btn').innerText = data.close;
        
        // Imposta lingua riconoscimento
        recognition.lang = (lang === 'it') ? 'it-IT' : (lang === 'en') ? 'en-US' : (lang === 'fr') ? 'fr-FR' : (lang === 'zh') ? 'zh-CN' : 'ar-SA';
        
        updateVideo(videoSources[lang]);
        closeMsg();
    }

    function updateVideo(id) {
        const player = document.getElementById('avatar-video');
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&controls=0&rel=0&enablejsapi=1&playsinline=1`;
    }

    function showMsg(text) {
        document.getElementById('message-text').innerText = text;
        document.getElementById('message-box').classList.add('active');
    }

    function closeMsg() { document.getElementById('message-box').classList.remove('active'); }

    const micBtn = document.getElementById('start-record');
    micBtn.onclick = () => { try { recognition.start(); } catch(e) {} };
    
    recognition.onstart = () => { 
        micBtn.classList.add('listening'); 
        document.getElementById('avatar-svg').classList.add('listening-animation');
        document.getElementById('status-text').innerText = translations[currentLang].status; 
    };

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.toLowerCase();
        document.getElementById('status-text').innerText = '"' + text + '"';
        micBtn.classList.remove('listening');
        document.getElementById('avatar-svg').classList.remove('listening-animation');
        const langData = translations[currentLang];
        let found = false;
        
        for (const [key, words] of Object.entries(langData.keywords)) {
            if (words.some(word => text.includes(word))) { 
                showMsg(langData.answers[key]); 
                found = true; 
                break; 
            }
        }
        if (!found) showMsg(langData.noMatch);
    };

    recognition.onspeechend = () => { 
        recognition.stop(); 
        micBtn.classList.remove('listening'); 
        document.getElementById('avatar-svg').classList.remove('listening-animation'); 
    };
    recognition.onerror = () => { 
        micBtn.classList.remove('listening'); 
        document.getElementById('avatar-svg').classList.remove('listening-animation'); 
    };
</script>
</body>
</html>
